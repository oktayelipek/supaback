services:
  supaback:
    build: .
    image: supaback:latest
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - supaback-data:/data
      - supaback-backups:/backups
    environment:
      # Supabase credentials — set in .env or in Coolify / Docker host env
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL:-}
      # Optional: S3-compatible destination
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  supaback-data:    # SQLite + settings
  supaback-backups: # local backup files
