# Self-hosted S3-compatible storage bundle using MinIO.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.minio.yml up -d
#
# MinIO console → http://localhost:9001  (admin / minioadmin)
# SupaBack UI   → http://localhost:8080
#
# In Settings, destination will be pre-configured as S3 pointing to MinIO.

services:
  supaback:
    environment:
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_BUCKET=supaback
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Creates the "supaback" bucket on first start, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/supaback &&
        echo 'bucket ready'
      "
    restart: on-failure

volumes:
  minio-data:
